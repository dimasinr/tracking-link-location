{% extends "base.html" %}

{% block title %}Login - LocTrack{% endblock %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 80px); width: 100%;">
    <div class="glass-card" style="width: 100%; max-width: 420px; padding: 40px;">
        <div style="text-align: center; margin-bottom: 32px;">
            <div class="logo-icon" style="margin: 0 auto 16px auto; width: 48px; height: 48px; border-radius: 12px;">
                <i data-lucide="map-pin" style="width: 24px; height: 24px;"></i>
            </div>
            <h2 style="font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Welcome back</h2>
            <p class="subtitle" style="margin-top: 6px;">Sign in to access your tracking panel</p>
        </div>

        {% if form.errors %}
        <div style="background-color: var(--danger-glow); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 8px; padding: 12px 16px; margin-bottom: 24px; font-size: 13px; color: var(--danger);">
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" class="form-control" placeholder="Enter username" required autocomplete="username">
            </div>
            
            <div class="form-group" style="margin-bottom: 24px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label for="id_password" style="margin-bottom: 0;">Password</label>
                </div>
                <input type="password" name="password" id="id_password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 12px;">
                Sign In
                <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i>
            </button>
        </form>
    </div>
</div>
{% endblock %}
